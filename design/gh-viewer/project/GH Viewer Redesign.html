<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>GH Viewer — Redesign</title>
  <link rel="stylesheet" href="gh.css" />
  <style>
    html, body { margin: 0; padding: 0; background: #0a0a0b; color: #f3f3f4; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", system-ui, sans-serif; }
    #root { width: 100vw; height: 100vh; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="data.jsx"></script>
  <script type="text/babel" src="diffs.jsx"></script>
  <script type="text/babel" src="popover.jsx"></script>
  <script type="text/babel" src="reviewer.jsx"></script>
  <script type="text/babel" src="picker.jsx"></script>
  <script type="text/babel" src="workspace.jsx"></script>
  <script type="text/babel" src="fusion.jsx"></script>
  <script type="text/babel" src="fusion-claude.jsx"></script>
  <script type="text/babel" src="popover-claude.jsx"></script>
  <script type="text/babel" src="settings.jsx"></script>

  <script type="text/babel">
    const NOTES = {
      fusion: "Fusion of the reviewer + repo workspace. The sidebar groups by local repo (root); inside each root its worktrees are listed directly, then its open PULL REQUESTS (from GitHub). Select a PR → unified diff with Approve/Request changes plus 'Checkout as worktree' (materializes the branch locally and switches to it). Select a worktree → PR-style diff (uncommitted + committed) with an editor strip and a ⋯ menu to create/remove branches and worktrees. No terminal.",
      reviewer: "Desktop reviewer app — the popover's big sibling. Right sidebar lists open PRs (filter + Review/Yours/All scope); click one and the main pane loads its unified git diff with per-file sticky headers, line numbers, +/− coloring, and Approve / Request changes / Comment actions in the PR header. Terminal-leaning: monospace metadata and diff throughout.",
      popover: "Top-bar PR popover. All three keep the macOS menubar feel — translucent dark surface, anchored under the branch glyph. A polishes the current direction; B groups PRs by relationship; C goes terminal-leaning with tabs and mono.",
      picker: "Repo picker. A is the centered hero made richer; B drops the empty state for a sidebar workspace with hover preview; C is a Spotlight/⌘O launcher.",
      workspace: "Repo workspace. Worktrees are now first-class, plus 'Open in editor' (Cursor/Claude/Codex/Zed). A simplifies the current toolbar (3 actions + overflow), collapses output into a drawer, and surfaces worktrees + linked PR + commits in the main pane. B promotes worktrees to top-level with an editor-icon strip. C is two-pane minimal — worktrees nest inside their branch in the sidebar, and main pane shows worktree cards with editor buttons inline.",
    };

    const App = () => (
      <DesignCanvas>
        <DCSection id="fusion" title="Review — roots × worktrees × PRs" subtitle={NOTES.fusion}>
          <DCArtboard id="fusion-v1" label="v1 · grouped by local root" width={1280} height={820}><FusionApp /></DCArtboard>
          <DCArtboard id="fusion-claude" label="Style B · cool-dark / indigo" width={1280} height={820}><CCFusionApp /></DCArtboard>
        </DCSection>

        <DCSection id="settings" title="Settings" subtitle="Two sections in a left rail. Notifier: polling interval, which events notify, and per-repo mute. Review app: which editors show in Open-with (+ default), per-root PR-section visibility, and an editable list of the exact git commands the app runs (tokens like {branch}/{path} substituted at run time).">
          <DCArtboard id="settings-b" label="Settings · cool-dark / indigo" width={1080} height={760}><SettingsApp /></DCArtboard>
        </DCSection>

        <DCSection id="reviewer" title="Desktop reviewer" subtitle={NOTES.reviewer}>
          <DCArtboard id="rev-desktop" label="Reviewer · sidebar + diff" width={1280} height={820}><DesktopReviewer /></DCArtboard>
        </DCSection>

        <DCSection id="popover" title="Top-bar PR popover" subtitle={NOTES.popover}>
          <DCArtboard id="pop-cc" label="Style B · cool-dark / indigo" width={420} height={620}><CCPopover /></DCArtboard>
          <DCArtboard id="pop-cc-notif" label="Style B · notification" width={420} height={620}><CCNotificationFrame /></DCArtboard>
          <DCArtboard id="pop-a" label="A · Review + Yours" width={420} height={620}><PopoverA /></DCArtboard>
          <DCArtboard id="pop-b" label="B · Grouped" width={420} height={620}><PopoverB /></DCArtboard>
          <DCArtboard id="pop-c" label="C · Mono / dense" width={420} height={620}><PopoverC /></DCArtboard>
          <DCArtboard id="pop-notif" label="Desktop notification" width={420} height={620}><NotificationFrame /></DCArtboard>
        </DCSection>

        <DCSection id="picker" title="Repo picker" subtitle={NOTES.picker}>
          <DCArtboard id="pick-c" label="A · Raycast launcher" width={920} height={580}><PickerC /></DCArtboard>
          <DCArtboard id="pick-d" label="B · Repo workspace in Raycast" width={920} height={580}><PickerD /></DCArtboard>
        </DCSection>

        <DCSection id="workspace" title="Repo workspace" subtitle="Standalone single-pane app. Title bar is now a Zed-style repo switcher (click it) → search + recent repos + branch/dirty/last-opened, active checkmark, Open folder. Below: push/fetch → current branch → worktrees (editor strip) → branches → stash → footer.">
          <DCArtboard id="ws-tiny" label="Tiny single-pane app" width={380} height={680}><TinyApp /></DCArtboard>
        </DCSection>
      </DesignCanvas>
    );

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
